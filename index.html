<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>My Book</title>
  <script src="https://unpkg.com/epubjs/dist/epub.min.js"></script>
</head>
<body style="margin:0;">
  <div id="viewer" style="height:100vh;"></div>

  <script>
    var book = ePub("book.epub");
    var rendition = book.renderTo("viewer", {
      width: "100%",
      height: "100%"
    });
    rendition.display();
  </script>
</body>
</html>

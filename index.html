<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HOW TO CREATE VISUALS</title>
  <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
</head>
<body style="margin:0;">
  <div id="viewer" style="width:100vw; height:100vh;"></div>
  <div id="error" style="padding:20px; font-family:sans-serif;"></div>

  <script>
    try {
      var book = ePub("book2.pdf");

      var rendition = book.renderTo("viewer", {
        width: "100%",
        height: "100%",
        spread: "none"
      });

      rendition.display();

      book.ready.catch(function(error) {
        document.getElementById("error").innerText =
          "EPUB could not be loaded: " + error;
      });
    } catch (error) {
      document.getElementById("error").innerText =
        "Viewer error: " + error;
    }
  </script>
</body>
</html>
